version: '3.8'

# ─────────────────────────────────────────────────────────────
# RxBridge — PRODUCTION HOSTING ONLY
#
# This file is used by Railway/Render/VPS to run the hosted build.
# It is NOT intended for local development — run .\dev.ps1 instead.
#
# Deploy:
#   docker compose -f docker-compose.deploy.yml up -d
# ─────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ENVIRONMENT=production
    # Security hardening — container has minimal privileges
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

# NOTE: Redis is NOT included here.
# Use Upstash Redis (serverless, free tier) — set REDIS_URL in .env.
# This avoids paying for a Redis container on every hosting platform.
